controller_manager:
  ros__parameters:
    update_rate: 100

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - left_finger_joint
      - right_finger_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_period: 0.01
    action_monitor_period: 0.1

    allow_partial_joints_goal: false
    continue_last_goal: false

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      joint_1:
        trajectory: 0.2
        goal: 0.1
      joint_2:
        trajectory: 0.2
        goal: 0.1
      joint_3:
        trajectory: 0.2
        goal: 0.1
      joint_4:
        trajectory: 0.2
        goal: 0.1
      left_finger_joint:
        trajectory: 0.2
        goal: 0.1
      right_finger_joint:
        trajectory: 0.2
        goal: 0.1